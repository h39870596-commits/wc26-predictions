<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC26 AI 数据分析 · 2026世界杯 AI 大数据预测与赛事数据分析</title>
<meta name="description" id="metaDesc" content="WC26 AI 数据分析:基于人工智能与大数据的 2026 美加墨世界杯赛事数据分析平台。AI 五维建模、球队实力评分、历史数据统计、比赛复盘与专家观点,全部结论来源可溯。非博彩网站,不提供任何投注功能。">
<style>
:root{
  --ink:#141414; --paper:#F7F5F0; --card:#FFFFFF; --line:#E8E4DA; --muted:#75705F;
  --gold:#C9A227; --gold-deep:#A8861A; --gold-soft:#F6EDD4;
  --us:#1F4FA0; --ca:#D52B1E; --mx:#006847;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink);line-height:1.6}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
button{font-family:inherit}
a{color:var(--us)}

/* ---------- animations ---------- */
@keyframes stripeFlow{0%{background-position:0 0}100%{background-position:240px 0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes floatY{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(6deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
@keyframes popIn{0%{opacity:0;transform:scale(.86)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{transition:none;opacity:1;transform:none}}

/* ---------- header ---------- */
.stripe{height:5px;background:repeating-linear-gradient(90deg,var(--us) 0 80px,var(--ca) 80px 160px,var(--mx) 160px 240px);background-size:240px 100%;animation:stripeFlow 9s linear infinite}
.hero{background:#111;color:#fff;position:relative;overflow:hidden}
.hero .wrap{position:relative;padding:30px 20px 0;z-index:1}
.hero-deco{position:absolute;inset:0;pointer-events:none;opacity:.5}
.hero-deco i{position:absolute;display:block;animation:floatY 9s ease-in-out infinite}
.hero-deco i:nth-child(1){right:6%;top:-30px;width:90px;height:90px;background:var(--us);animation-delay:-2s}
.hero-deco i:nth-child(2){right:16%;top:90px;width:44px;height:44px;border-radius:50%;background:var(--ca);animation-delay:-5s}
.hero-deco i:nth-child(3){right:2%;top:120px;width:80px;height:80px;border-radius:0 0 0 80px;background:var(--mx);animation-delay:-7s}
.hero-deco i:nth-child(4){right:24%;top:-12px;width:30px;height:30px;border-radius:50%;background:var(--gold);animation-delay:-3.5s}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.kicker{color:var(--gold);font-size:12px;letter-spacing:.3em;font-weight:700;margin-bottom:8px}
.lang-btn{appearance:none;border:1px solid #4d4736;background:rgba(255,255,255,.04);color:#D8D3C4;font-size:12px;font-weight:700;border-radius:999px;padding:5px 15px;cursor:pointer;transition:.2s;flex-shrink:0}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
h1{font-size:clamp(24px,3.6vw,36px);font-weight:900;letter-spacing:.02em;line-height:1.2}
h1 .y{background:linear-gradient(110deg,var(--gold) 35%,#F4E3A4 50%,var(--gold) 65%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 5s linear infinite}
.hero-sub{color:#C9C4B6;font-size:13px;margin-top:7px;max-width:680px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{font-size:11px;border:1px solid #3a382f;background:rgba(255,255,255,.05);color:#D8D3C4;border-radius:999px;padding:3px 12px;font-weight:600}
.hero-meta{color:#A8A498;margin-top:10px;font-size:12.5px;display:flex;flex-wrap:wrap;gap:6px 16px}
.hero-meta b{color:#D8D3C4;font-weight:600}
.tabs{display:flex;gap:4px;margin-top:20px;flex-wrap:wrap}
.tab{appearance:none;border:none;background:transparent;color:#B8B3A4;font-size:14.5px;font-weight:700;padding:11px 18px;border-radius:12px 12px 0 0;cursor:pointer;position:relative;transition:color .25s,background .25s}
.tab:hover{color:#fff}
.tab.on{background:var(--paper);color:var(--ink)}
.tab .lock{font-size:11px;margin-left:4px}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ca);margin-left:6px;animation:pulse 1.6s ease-in-out infinite;vertical-align:2px}
.notice{background:#F2EFE7;border-bottom:1px solid var(--line);font-size:12px;color:#6a6557;padding:8px 0;text-align:center}
.notice .wrap{padding:0 20px}

/* ---------- views ---------- */
.view{display:none}
.view.on{display:block;animation:fadeUp .4s ease}
main{min-height:60vh}
section{padding:34px 0 6px}
.sec-kicker{color:var(--gold-deep);font-size:11.5px;letter-spacing:.28em;font-weight:800;margin-bottom:4px}
.sec-title{font-size:22px;font-weight:900;margin-bottom:4px}
.sec-desc{color:var(--muted);font-size:13.5px;max-width:760px;margin-bottom:18px}
.subsec{margin-top:34px}

/* ---------- today ---------- */
.day-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.day-pill{background:#15140F;color:#fff;border-radius:999px;padding:6px 16px;font-weight:800;font-size:14px}
.day-sub{color:var(--muted);font-size:13px}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:22px;overflow:hidden;transition:transform .25s,box-shadow .25s}
.mcard:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(20,20,20,.08)}
.mcard.featured{border-color:#E0CB85;box-shadow:0 6px 24px rgba(201,162,39,.12)}
.mtop{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.gtag{color:#fff;border-radius:6px;padding:1px 8px;font-weight:800;font-size:12px}
.feat-tag{background:linear-gradient(135deg,var(--gold-deep),var(--gold));color:#fff;border-radius:6px;padding:1px 9px;font-weight:800;font-size:11.5px}
.stat-pill{margin-left:auto;font-size:11.5px;font-weight:700;border-radius:999px;padding:2px 10px;background:#F2EFE7;color:var(--muted)}
.stat-pill.live{background:var(--ca);color:#fff}
.mteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:20px 20px 8px}
.mteam{text-align:center}
.mteam .f{font-size:44px;line-height:1}
.mteam .n{font-weight:900;font-size:18px;margin-top:4px}
.mteam .v{font-size:11.5px;color:var(--muted);margin-top:2px}
.mvs{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-align:center}
.mvs .hl{display:block;font-size:11px;color:var(--gold-deep);margin-top:2px;font-weight:800}
.envrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 20px 4px}
.env{font-size:12px;background:#F2EFE7;border-radius:999px;padding:3px 12px;color:#55514a}
.facwrap{padding:14px 20px 6px}
.fhead{font-size:12px;color:var(--gold-deep);font-weight:800;letter-spacing:.18em;margin-bottom:8px}
.fac{display:grid;grid-template-columns:1fr 96px 1fr;gap:6px;align-items:center;padding:7px 0;border-top:1px dashed #EFEBE0;font-size:12.5px}
.fac .l{text-align:right}.fac .r{text-align:left}
.fac .c{text-align:center;font-weight:800;font-size:12px;color:#55514a}
.fac .edge{font-weight:800}
.fac .edge.h{color:var(--mx)}.fac .edge.a{color:var(--us)}
.fac .note{grid-column:1/4;text-align:center;font-size:11px;color:var(--muted);margin-top:-2px}
.lean{margin:12px 20px;background:var(--gold-soft);border:1px solid #E5D8AC;border-radius:10px;padding:10px 16px;font-size:13.5px;color:#5d5230;font-weight:600}
.no-feat{margin:0 20px 18px;background:#F7F5F0;border:1px dashed var(--line);border-radius:10px;padding:10px 16px;font-size:12.5px;color:var(--muted)}
.paid-zone{margin:0 20px 18px;border:1.5px dashed var(--gold);border-radius:12px;padding:16px 18px;position:relative}
.paid-zone.unlocked{border-style:solid;animation:popIn .5s ease}
.pz-title{font-size:12px;letter-spacing:.2em;color:var(--gold-deep);font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ent-tag{background:#EAF3EC;color:var(--mx);font-size:11px;border-radius:6px;padding:1px 8px;font-weight:700;letter-spacing:0}
.pz-locked{text-align:center;padding:8px 0 4px}
.pz-locked .blur-score{font-size:34px;font-weight:900;filter:blur(10px);user-select:none;letter-spacing:.1em}
.pz-locked p{font-size:12.5px;color:var(--muted);margin:6px 0 12px}
.pz-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-gold{appearance:none;border:none;background:linear-gradient(135deg,var(--gold-deep),var(--gold));color:#fff;font-weight:800;font-size:14px;border-radius:999px;padding:10px 26px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,162,39,.4)}
.btn-ghost{appearance:none;border:1.5px solid var(--gold);background:transparent;color:var(--gold-deep);font-weight:800;font-size:13px;border-radius:999px;padding:9px 22px;cursor:pointer;transition:.2s}
.btn-ghost:hover{background:var(--gold-soft)}
.pz-score{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pz-score .sc{font-size:36px;font-weight:900;letter-spacing:.06em;animation:popIn .55s ease}
.pz-score .cf{font-size:12px;color:var(--muted)}
.cf b{color:var(--gold-deep);font-size:16px}
.probs{margin-top:12px}
.prob{display:grid;grid-template-columns:110px 1fr 44px;gap:10px;align-items:center;font-size:12.5px;padding:3px 0}
.prob .bar{height:9px;background:#F0EDE4;border-radius:5px;overflow:hidden}
.prob .bar i{display:block;height:100%;border-radius:5px;width:0;transition:width 1s cubic-bezier(.2,.7,.3,1)}
.analysis{margin-top:14px;font-size:13.5px;color:#3d3a30;line-height:1.8;border-top:1px dashed #E5D8AC;padding-top:12px}
.pz-foot{font-size:11px;color:var(--muted);margin-top:10px;border-top:1px dashed #E5D8AC;padding-top:8px}
.srcs{margin:0 20px 16px}
.srcs summary{font-size:12px;color:var(--muted);cursor:pointer;padding:6px 0}
.srcs a{display:block;font-size:11.5px;color:var(--us);text-decoration:none;padding:2px 0;word-break:break-all}
.gen-note{font-size:12px;color:var(--muted);text-align:center;padding:20px;background:var(--card);border:1px dashed var(--line);border-radius:var(--r)}

/* ---------- analytics ---------- */
.method-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.mchip{font-size:12px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:4px 13px;color:#55514a}
.mchip b{color:var(--gold-deep)}
.contenders{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(235px,100%),1fr));gap:12px}
.cont{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;gap:6px;align-items:center}
.cont .info{flex:1;min-width:0}
.cont .nm{font-weight:800;font-size:15px;white-space:nowrap}
.cont .meta{font-size:11.5px;color:var(--muted);margin-top:1px}
.cont .ov{font-size:23px;font-weight:900;color:var(--gold-deep)}
.cont .ovl{font-size:10.5px;color:var(--muted);letter-spacing:.1em}
.rate-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
.gtable th{font-size:10.5px;color:var(--muted);font-weight:600;text-align:right;padding:7px 6px;border-bottom:1px solid var(--line)}
.gtable th:nth-child(2){text-align:left}
.gtable td{padding:6px;text-align:right;border-bottom:1px solid #F1EEE6}
.gtable td:nth-child(2){text-align:left;font-weight:600;white-space:nowrap}
.gtable tr.q12 td{background:#F4F8F2}
.gtable tr.q12 td:first-child{box-shadow:inset 3px 0 0 var(--mx)}
.gtable tr.q3y td{background:#FBF7EA}
.gtable tr.q3y td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
.gtable .pts{font-weight:800}
.rate-card .gtable td{padding:6px 8px}
.rate-card .gtable .ov{font-weight:900;color:var(--gold-deep)}
.rate-card .gtable .dim{color:#8a8470;font-size:11.5px}
.hbar{display:grid;grid-template-columns:minmax(110px,150px) 1fr 64px;gap:10px;align-items:center;font-size:12.5px;padding:4px 0}
.hbar .bar{height:10px;background:#F0EDE4;border-radius:5px;overflow:hidden}
.hbar .bar i{display:block;height:100%;border-radius:5px;width:0;transition:width 1s cubic-bezier(.2,.7,.3,1)}
.hbar .val{font-weight:800;text-align:right}
.hbar .sub{font-size:10.5px;color:var(--muted);font-weight:400}
.hcardx{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.two-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(420px,100%),1fr));gap:14px}
.facts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(235px,100%),1fr));gap:10px}
.fact{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.fact .fl{font-size:11px;color:var(--muted);letter-spacing:.04em}
.fact .fv{font-weight:800;font-size:13.5px;margin-top:3px;line-height:1.5}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
.champ-cell{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 8px;font-size:11.5px;text-align:center;transition:transform .2s}
.champ-cell:hover{transform:translateY(-2px)}
.champ-cell .yr{font-weight:900;color:var(--gold-deep);font-size:12.5px}
.champ-cell .wn{font-weight:800;font-size:12.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.champ-cell .rs{color:var(--muted);font-size:10.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.consensus{background:linear-gradient(150deg,#171511,#262012);color:#E0DBCB;border-radius:var(--r);padding:18px 22px;font-size:13.5px;line-height:1.9;margin-bottom:14px}
.consensus .cl{font-size:11px;letter-spacing:.22em;color:var(--gold);font-weight:800;margin-bottom:6px}
.xgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:12px}
.xcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.xcard .xq{font-size:13px;line-height:1.8;color:#3d3a30;flex:1}
.xcard .xwho{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.xcard .xwho b{color:var(--ink)}
.xpick{background:var(--gold-soft);color:var(--gold-deep);border-radius:6px;padding:1px 8px;font-weight:800;font-size:11px}
.src-link{font-size:11px;color:var(--us);text-decoration:none}
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:12px}
.scard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.scard .st{font-weight:800;font-size:14.5px;margin-bottom:6px}
.scard .sb{font-size:12.5px;color:#55514a;line-height:1.8}
.scard .src-link{display:inline-block;margin-top:8px}

/* ---------- review & recaps ---------- */
.rev-day{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.rev-head{display:flex;align-items:center;gap:10px;padding:13px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.rev-head .d{font-weight:900;font-size:15px}
.rev-head .s{font-size:12px;color:var(--muted)}
.rev-head .tag{margin-left:auto;font-size:11.5px;font-weight:700;border-radius:999px;padding:2px 10px}
.tag-done{background:#EAF3EC;color:var(--mx)}
.tag-wait{background:var(--gold-soft);color:var(--gold-deep)}
.rev-item{display:flex;align-items:center;gap:12px;padding:11px 20px;border-top:1px dashed #EFEBE0;font-size:13.5px;flex-wrap:wrap}
.rev-item:first-of-type{border-top:none}
.rev-item .mt{font-weight:700;min-width:200px}
.pillbox{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spill{border-radius:7px;padding:1px 10px;font-weight:800;font-size:12.5px}
.spill.p{background:#F2EFE7;color:#55514a}
.spill.a{background:#15140F;color:#fff}
.spill.na{background:transparent;color:var(--muted);font-weight:500}
.hit{font-size:11.5px;font-weight:800;border-radius:5px;padding:1px 8px}
.hit.full{background:var(--mx);color:#fff}.hit.dir{background:var(--gold);color:#fff}.hit.miss{background:#999;color:#fff}.hit.wait{background:#F2EFE7;color:var(--muted)}
.rev-item .nt{flex-basis:100%;font-size:12px;color:var(--muted)}
.res-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:12px}
.res{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13.5px}
.res .d{font-size:11.5px;color:var(--muted);width:46px}
.res b{font-weight:800}
.res .sc{margin-left:auto;background:#15140F;color:#fff;border-radius:7px;padding:1px 10px;font-weight:800}
.recap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.recap-head{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.recap-head .f{font-size:26px}
.recap-head .n{font-weight:900;font-size:16px}
.recap-head .sc{background:#15140F;color:#fff;border-radius:8px;padding:2px 13px;font-weight:900;font-size:16px}
.recap-head .meta{margin-left:auto;font-size:11.5px;color:var(--muted);text-align:right}
.recap-body{padding:14px 20px 6px;font-size:13.5px;line-height:1.85;color:#3d3a30}
.tl{padding:4px 20px 8px}
.tl-row{display:flex;gap:10px;font-size:12.5px;padding:5px 0;border-top:1px dashed #EFEBE0;align-items:baseline}
.tl-min{min-width:44px;font-weight:800;color:var(--gold-deep);text-align:right;flex-shrink:0}
.turn{margin:8px 20px 14px;background:var(--gold-soft);border:1px solid #E5D8AC;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#5d5230}
.rstats{padding:0 20px 10px}

/* ---------- full (simulation) ---------- */
.gate{background:linear-gradient(150deg,#171511,#262012);border-radius:var(--r);color:#fff;padding:38px 30px;text-align:center;position:relative;overflow:hidden}
.gate .big{font-size:44px;animation:floatY 7s ease-in-out infinite;display:inline-block}
.gate h3{font-size:22px;font-weight:900;margin:8px 0 6px}
.gate p{color:#C9C4B6;font-size:13px;max-width:560px;margin:0 auto 8px}
.gate ul{list-style:none;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 20px}
.gate li{font-size:12px;border:1px solid #4d4736;border-radius:999px;padding:4px 14px;color:#E0DBCB}
.gate .mini{font-size:11px;color:#8d887a;margin-top:12px}
.blurband{margin-top:26px;filter:blur(7px);user-select:none;pointer-events:none;opacity:.6;font-weight:900;font-size:22px;letter-spacing:.18em}
.sandbox{background:#FBF7EA;border:1px solid #E5D8AC;border-radius:var(--r);padding:12px 18px;font-size:12.5px;color:#5d5230;margin-bottom:18px}
.champ-strip{background:linear-gradient(135deg,#1c1a14,#26200f);border:1px solid #4d3f17;border-radius:var(--r);padding:18px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;color:#fff;margin-bottom:22px}
.champ-cup{font-size:34px;filter:drop-shadow(0 2px 8px rgba(201,162,39,.45))}
.champ-label{font-size:11px;letter-spacing:.22em;color:var(--gold);font-weight:700}
.champ-name{font-size:25px;font-weight:900;margin-top:1px}
.champ-final{margin-left:auto;text-align:right;font-size:12.5px;color:#C9C4B6}

<script>
/* ================= helpers ================= */

const storeGet = k => { try { return window.localStorage.getItem(k); } catch (e) { return null; } };
const storeSet = (k, v) => { try { window.localStorage.setItem(k, v); } catch (e) {} };
const storeDel = k => { try { window.localStorage.removeItem(k); } catch (e) {} };

/* legacy demo key → season */
if (storeGet('wc26_unlocked') === '1') { storeSet('wc26_season', '1'); storeDel('wc26_unlocked'); }

const state = {
  lang: storeGet('wc26_lang') || ((navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en'),
  view: 'today',
  paySel: 'season',
  payBusy: false,
};
const L = (zh, en) => state.lang === 'zh' ? zh : en;
const tn = n => state.lang === 'zh' ? (T(n).zh || n) : n;
const fl = n => esc(T(n).flag || '');
const fmtD = d => d.slice(5).replace('-', '.');
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dLong = d => { const m = +d.slice(5, 7), dd = +d.slice(8, 10); return state.lang === 'zh' ? (m + ' 月 ' + dd + ' 日') : (MON[m - 1] + ' ' + dd); };
const CITY_ZH = {'Mexico City':'墨西哥城','Guadalajara':'瓜达拉哈拉','Zapopan':'瓜达拉哈拉','Monterrey':'蒙特雷','Guadalupe (Monterrey)':'蒙特雷','Atlanta':'亚特兰大','Toronto':'多伦多','Toronto, Canada':'多伦多','Vancouver':'温哥华','Seattle':'西雅图','Santa Clara':'旧金山湾区','San Francisco Bay':'旧金山湾区','Inglewood':'洛杉矶','Inglewood (Los Angeles), USA':'洛杉矶','Los Angeles':'洛杉矶','East Rutherford':'纽约/新泽西','New York/New Jersey':'纽约/新泽西','Foxborough':'波士顿','Boston':'波士顿','Philadelphia':'费城','Houston':'休斯敦','Arlington':'达拉斯','Dallas':'达拉斯','Miami Gardens':'迈阿密','Miami':'迈阿密','Kansas City':'堪萨斯城'};

const GC = ['var(--mx)','var(--us)','var(--ca)'];
const DIM_Z = ['实力','状态','阵容','底蕴','环境'];
const DIM_E = ['Strength','Form','Squad','Pedigree','Env'];
const DIM_S = ['STR','FRM','SQD','PED','ENV'];

/* flags for historical nations (incl. teams not in WC26) */
const XFLAG = {'Brazil':'🇧🇷','Germany':'🇩🇪','West Germany':'🇩🇪','Italy':'🇮🇹','Argentina':'🇦🇷','Uruguay':'🇺🇾','France':'🇫🇷','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Spain':'🇪🇸','Netherlands':'🇳🇱','Hungary':'🇭🇺','Sweden':'🇸🇪','Croatia':'🇭🇷','Czechoslovakia':'🇨🇿','Poland':'🇵🇱','Portugal':'🇵🇹'};
const xfl = n => { n = String(n || ''); return XFLAG[n] || XFLAG[n.split('(')[0].trim()] || esc(T(n).flag || ''); };
const vEn = s => {
  if (!s) return s;
  let m = /€([\d.]+)亿/.exec(s);
  if (m) return '€' + (parseFloat(m[1]) * 100).toFixed(1).replace(/\.0$/, '') + 'M';
  m = /€([\d.]+)万/.exec(s);
  if (m) return '€' + (parseFloat(m[1]) / 100).toFixed(1).replace(/\.0$/, '') + 'M';
  return s;
};
const kickEn = s => s ? s.replace('当地', 'Local').replace(/\s*·?\s*北京时间/, ' · Beijing ').replace(/(\d{1,2})月(\d{1,2})日/g, (_, a, b) => MON[+a - 1] + ' ' + b) : '';
const P = (WC.pay && WC.pay.products) || { day: { price: '¥9.9' }, season: { price: '¥98' } };

const ent = () => storeGet('wc26_season') === '1' ? 'season'
  : (WC.today && storeGet('wc26_day') === WC.today.date ? 'day' : null);

const played = WC.schedule.filter(m => m.actual);

/* ================= chrome (hero/tabs/notice/footer) ================= */
function renderChrome() {
  document.documentElement.lang = L('zh-CN', 'en');
  document.title = L('WC26 AI 数据分析 · 2026世界杯 AI 大数据预测与赛事数据分析', 'WC26 AI Analytics · 2026 World Cup AI predictions & data analysis');
  const md = $('#metaDesc');
  if (md) md.content = L('WC26 AI 数据分析:基于人工智能与大数据的 2026 美加墨世界杯赛事数据分析平台。AI 五维建模、球队实力评分、历史数据统计、比赛复盘与专家观点,全部结论来源可溯。非博彩网站,不提供任何投注功能。',
    'WC26 AI Analytics: an AI & big-data analytics platform for the 2026 FIFA World Cup. Five-dimension team modelling, power ratings, historical stats, match recaps and expert views — fully sourced. Not a betting site.');
  $('#kicker').textContent = 'FIFA WORLD CUP 26™ · ' + L('美国 / 加拿大 / 墨西哥', 'USA / CANADA / MEXICO');
  $('#langBtn').textContent = state.lang === 'zh' ? 'EN' : '中文';
  $('#h1t').innerHTML = 'WC26 <span class="y">' + L('AI 数据分析', 'AI Analytics') + '</span>';
  $('#heroSub').textContent = L('人工智能 × 大数据驱动的世界杯赛事数据分析平台:多智能体联网调研、多源事实核查,全部结论可溯源。',
    'An AI & big-data World Cup analytics platform: multi-agent web research with multi-source fact-checking — every claim traceable.');
  $('#badges').innerHTML = [

    '🔍 ' + L('来源可溯', 'Traceable sources'),
    '🚫 ' + L('非博彩 · 拒绝赌球', 'Not a betting site'),
  ].map(b => '<span class="badge">' + b + '</span>').join('');
  $('#heroMeta').innerHTML = '<span>' + L('AI 五维建模 · 48 队 · 104 场', 'AI 5-dim model · 48 teams · 104 matches') + '</span>' +
    '<span>' + L('已赛 ', 'Played ') + '<b class="num">' + played.length + '</b>' + L(' 场', '') + '</span>' +
    '<span>' + L('更新 ', 'Updated ') + '<b class="num">' + esc(WC.meta.updated) + '</b></span>';
  const tabs = [
    ['today', L('今日预测', "Today's Forecast") + '<span class="dot"></span>'],
    ['data', L('数据分析', 'Analytics')],
    ['review', L('赛果复盘', 'Results & Review')],
    ['full', L('全程推演', 'Full Simulation') + (ent() === 'season' ? '' : '<span class="lock">🔒</span>')],
  ];
  $('#tabs').innerHTML = tabs.map(t => '<button class="tab' + (state.view === t[0] ? ' on' : '') + '" data-v="' + t[0] + '">' + t[1] + '</button>').join('');
  $('#noticeTxt').innerHTML = '🛡 ' + L('本站为 <b>AI 大数据体育数据分析平台</b>:所有内容由统计模型与公开数据生成,仅供研究与观赛参考 · 不提供任何投注功能,不构成投注建议 · 拒绝赌球,理性观赛',
    'This is an <b>AI sports data-analytics platform</b>: all content is generated by statistical models from public data, for research & viewing reference only · No betting features, no betting advice · Watch responsibly');
  $('#footWrap').innerHTML =
    '<p><b>' + L('免责声明', 'Disclaimer') + '</b> ' + L('本站为 AI 大数据体育数据分析平台。所有预测与分析均由统计模型与公开资料生成,仅供研究参考与观赛娱乐,不构成任何投注建议;本站不提供任何形式的投注、竞猜功能。请理性观赛,拒绝赌球。已赛比分为真实赛果,事实性资料带来源标注,截至页面更新时间。付费功能当前为演示模式,未接入真实支付。',
      'This site is an AI sports data-analytics platform. All predictions and analysis are generated by statistical models from public data, for research and entertainment only — never betting advice. No betting or wagering features are offered. Completed scores are real results; factual material is source-annotated as of the page update time. Payments are currently in demo mode.') + '</p>' +
    '<div class="compliance">' +
      '<span>📊 ' + L('数据来源公开可溯', 'Open, traceable data sources') + '</span>' +
      '<span>🚫 ' + L('不提供投注渠道', 'No betting channels') + '</span>' +
      '<span>📄 ' + L('付费为数据分析内容服务', 'Paid tiers are data-analytics content') + '</span>' +
      '<span>🧠 ' + L('18+ 理性观赛', 'Watch responsibly') + '</span>' +
    '</div>' +
    '<div class="fin"><span>WC26 AI ' + L('数据分析', 'ANALYTICS') + ' · FIFA WORLD CUP 26™</span>' +
    '<span>' + L('数据更新 ', 'Updated ') + esc(WC.meta.updated) + ' · ' + L('AI 多智能体联网调研生成', 'Generated by multi-agent AI research') + '</span></div>';
}

/* ================= tabs / reveal ================= */
$('#tabs').addEventListener('click', e => {
  const b = e.target.closest('.tab');
  if (!b) return;
  state.view = b.dataset.v;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x === b));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  const v = $('#v-' + state.view);
  v.classList.add('on');
  bindReveal(v);
  animateBars(v);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
$('#langBtn').addEventListener('click', () => {
  state.lang = state.lang === 'zh' ? 'en' : 'zh';
  storeSet('wc26_lang', state.lang);
  renderAll();
});
const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }), { threshold: .08 });
function bindReveal(root) { (root || document).querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el)); }
function animateBars(root) { setTimeout(() => (root || document).querySelectorAll('.bar i').forEach(b => { b.style.width = b.dataset.w + '%'; }), 80); }

/* ================= today ================= */
function statusPill(st) {
  if (st === 'played') return '<span class="stat-pill">' + L('已完赛', 'FT') + '</span>';
  if (st === 'live') return '<span class="stat-pill live">' + L('进行中', 'LIVE') + '</span>';
  return '<span class="stat-pill">' + L('未开赛', 'Upcoming') + '</span>';
}
function probBars(p, home, away) {
  const rows = [[L(esc(tn(home)) + ' 胜', esc(tn(home)) + ' win'), p.home, 'var(--mx)'], [L('战平', 'Draw'), p.draw, '#B8B3A4'], [L(esc(tn(away)) + ' 胜', esc(tn(away)) + ' win'), p.away, 'var(--us)']];
  return '<div class="probs">' + rows.map(r =>
    '<div class="prob"><span>' + r[0] + '</span><span class="bar"><i data-w="' + r[1] + '" style="background:' + r[2] + '"></i></span><b class="num">' + r[1] + '%</b></div>').join('') + '</div>';
}
function renderToday() {
  const el = $('#v-today'), td = WC.today;
  let h = '<section><div class="sec-kicker">MATCH DAY · AI FORECAST</div><div class="sec-title">' + L('今日赛场 · AI 深度预测', "Today's Matches · AI Deep Forecast") + '</div>' +
    '<p class="sec-desc">' + L('AI 多智能体当日联网调研:综合天气温度、场馆条件、阵容身价、硬实力、近期状态、伤病情况与市场数据等全要素建模分析;事实经多源核查,来源可溯。',
      'Same-day multi-agent AI research: weather, venue, squad value, raw strength, form, injuries and market data — modelled end to end, fact-checked across sources, fully traceable.') + '</p>';
  if (!td || !td.matches || !td.matches.length) {
    h += '<div class="gen-note">' + L('今日暂无比赛或深度分析生成中,请稍后刷新。', 'No matches today, or the analysis is still generating — check back soon.') + '</div></section>';
    el.innerHTML = h; return;
  }
  let fm = td.matches.find(m => m.no === td.featured) || td.matches.find(m => m.paid) || td.matches[0];
  h += '<div class="day-head reveal"><span class="day-pill num">' + (state.lang === 'zh' ? esc(td.label) : dLong(td.date) + ' · Matchday') + '</span>' +
    '<span class="day-sub">' + L('共 ' + td.matches.length + ' 场 · 时间为当地时间 · 每日精选 1 场发布 AI 预测报告', td.matches.length + ' matches · local kick-off times · one featured AI report per day') + '</span></div>';
  td.matches.forEach((m, i) => {

function radarSVG(dims) {
  const cx = 56, cy = 52, R = 40, N = 5;
  const pt = (i, r) => { const a = -Math.PI / 2 + i * 2 * Math.PI / N; return (cx + r * Math.cos(a)).toFixed(1) + ',' + (cy + r * Math.sin(a)).toFixed(1); };
  let s = '<svg width="112" height="104" viewBox="0 0 112 104">';
  for (const f of [1, .66, .33]) s += '<polygon points="' + [0,1,2,3,4].map(i => pt(i, R * f)).join(' ') + '" fill="none" stroke="#E4E0D4" stroke-width="1"/>';
  for (let i = 0; i < N; i++) s += '<line x1="' + cx + '" y1="' + cy + '" x2="' + pt(i, R).replace(',', '" y2="') + '" stroke="#EEEAE0" stroke-width="1"/>';
  s += '<polygon points="' + dims.map((v, i) => pt(i, R * v / 100)).join(' ') + '" fill="rgba(201,162,39,.22)" stroke="var(--gold-deep)" stroke-width="1.8"/>';
  const lp = [[56,8],[102,41],[88,100],[24,100],[10,41]];
  const lbl = state.lang === 'zh' ? DIM_Z : DIM_S;
  lbl.forEach((l, i) => s += '<text x="' + lp[i][0] + '" y="' + lp[i][1] + '" font-size="' + (state.lang === 'zh' ? 9 : 8) + '" fill="#9a9484" text-anchor="middle">' + l + '</text>');
  return s + '</svg>';
}
function countUps(root) {
  root.querySelectorAll('[data-cnt]').forEach(el => {
    const target = parseFloat(el.dataset.cnt); const t0 = performance.now();
    const step = t => { const k = Math.min(1, (t - t0) / 900); el.textContent = (target * (1 - Math.pow(1 - k, 3))).toFixed(1); if (k < 1) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  });
}

    if (sm) h += '<div class="rev-item"><span class="nt">📋 ' + esc(sm) + '</span></div>';

  el.innerHTML = h;
}

function dimChips(hN, aN) {
  const a = T(hN).dims, b = T(aN).dims;
  if (!a || !b) return '';
  const diffs = a.map((v, i) => ({ i, d: v - b[i] })).sort((x, y) => Math.abs(y.d) - Math.abs(x.d)).slice(0, 2);
  const part = diffs.map(x => dimN(x.i) + (x.d >= 0 ? '+' : '') + x.d + '(' + (x.d >= 0 ? L('主', 'H') : L('客', 'A')) + ')').join(' · ');
  return L('综合 ', 'Overall ') + T(hN).overall + ' : ' + T(aN).overall + L(' · 五维最大差 ', ' · top gaps ') + part;
}
